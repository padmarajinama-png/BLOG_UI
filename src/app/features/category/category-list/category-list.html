<div class="container">
  <h1 class="mt-3">Category List</h1>

  <div class="d-flex justify-content-end mt-3">
    <a [routerLink]="['/admin/categories/add']"
       class="btn btn-primary">
       Add Category
    </a>
  </div>

  <!-- Table goes here -->
  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        
        <th>Name</th>
        <th>URL Handle</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      @for (category of value(); track category.id) {
        <tr>
       
          <td>{{ category.name }}</td>
          <td>{{ category.urlHandle }}</td>
          <td>
 <a class="btn btn-light" [routerLink]="['/admin/categories/edit', category.id]">Edit</a>
 </td>
 
        </tr>
      }
    </tbody>
  </table>
</div>
